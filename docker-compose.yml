services:
  brain-api:
    build: ./brain_api
    container_name: learnfinance-brain-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./brain_api/.env

  temporal-server:
    image: temporalio/auto-setup:latest
    container_name: learnfinance-temporal-server
    restart: always
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=sqlite
      - TEMPORAL_ADDRESS=0.0.0.0:7233

  temporal-worker:
    build: ./temporal
    container_name: learnfinance-temporal-worker
    restart: always
    depends_on:
      - temporal-server
      - brain-api
    environment:
      - TEMPORAL_ADDRESS=temporal-server:7233
      - BRAIN_API_URL=http://brain-api:8000
    command: ["uv", "run", "python", "-m", "worker"]
